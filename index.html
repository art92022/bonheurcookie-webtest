<!DOCTYPE html>
<html lang="zh-TW">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bonheur Cookie - 幸福送達</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=Playfair+Display:ital,wght@0,500;0,600;1,500&display=swap" rel="stylesheet">

  <style>
    /* --- 1. UI 風格設定 --- */
    :root {
      --bg-color: #F8F4F0;
      /* 溫潤米色 */
      --accent-color: #C39A6B;
      /* 金棕色 */
      --text-color: #5E5148;
      /* 深褐灰 */
      --warning-color: #C74838;
      /* 警示紅 */
      --card-bg: #FFFFFF;
      /* 純白 */
      --shadow: 0 4px 12px rgba(195, 154, 107, 0.1);
      --radius: 12px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: 'Noto Sans TC', sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      display: flex;
      justify-content: center;
      min-height: 100vh;
      line-height: 1.75;
      font-size: 14px;
      letter-spacing: 0.05em;
    }

    .container {
      width: 100%;
      max-width: 460px;
      padding: 50px 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      animation: fadeIn 1s ease forwards;
      opacity: 0;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(15px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* --- Header (無Logo版) --- */
    header {
      text-align: center;
      margin-bottom: 35px;
      width: 100%;
      padding-top: 20px;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      color: var(--text-color);
      margin-bottom: 8px;
      font-weight: 600;
      line-height: 1.2;
      white-space: nowrap;
    }

    .subtitle {
      font-size: 0.85rem;
      color: #8C7B70;
      letter-spacing: 0.15em;
      margin-top: 5px;
    }

    /* --- Links List --- */
    #links-list {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin-bottom: 40px;
    }

    .link-card {
      display: flex;
      align-items: center;
      background: var(--card-bg);
      padding: 16px 20px;
      border-radius: var(--radius);
      text-decoration: none;
      color: var(--text-color);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.02);
      border: 1px solid rgba(195, 154, 107, 0.15);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .link-card:active {
      transform: scale(0.98);
    }

    .link-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 15px rgba(195, 154, 107, 0.15);
    }

    .link-icon {
      font-size: 1.3rem;
      margin-right: 16px;
      width: 24px;
      text-align: center;
    }

    .link-text {
      font-weight: 500;
      font-size: 1rem;
      flex-grow: 1;
    }

    .link-arrow {
      color: var(--accent-color);
      font-size: 1.2rem;
      opacity: 0.5;
    }

    /* --- FAQ Section --- */
    #faq-section {
      width: 100%;
      background: #fff;
      border-radius: var(--radius);
      padding: 10px 24px;
      box-shadow: var(--shadow);
    }

    .faq-item {
      border-bottom: 1px solid #EEE;
    }

    .faq-item:last-child {
      border-bottom: none;
    }

    .faq-question {
      width: 100%;
      padding: 18px 0;
      text-align: left;
      background: none;
      border: none;
      font-size: 1rem;
      font-weight: 500;
      color: var(--text-color);
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .faq-question::after {
      content: '+';
      font-size: 1.4rem;
      color: var(--accent-color);
      font-weight: 300;
      transition: transform 0.3s;
    }

    .faq-answer {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.4s ease-out;
      color: #6E645D;
      font-size: 0.9rem;
      line-height: 1.8;
      text-align: left;
    }

    .answer-content {
      padding: 5px 0 24px 0;
      text-align: left;
    }

    .answer-content ul {
      padding-left: 18px;
      margin: 8px 0;
    }

    .answer-content li {
      margin-bottom: 6px;
    }

    .highlight {
      color: var(--accent-color);
      font-weight: 600;
    }

    .warning {
      color: var(--warning-color);
      font-weight: 500;
    }

    .small {
      font-size: 0.85rem;
      color: #999;
      display: block;
      margin-top: 5px;
    }

    /* 展開狀態 */
    .faq-item.active .faq-answer {
      max-height: 1200px;
    }

    .faq-item.active .faq-question::after {
      content: '-';
      transform: rotate(180deg);
    }

    footer {
      margin-top: 40px;
      font-size: 0.75rem;
      color: #B0A69E;
      text-align: center;
      font-family: 'Playfair Display', serif;
      letter-spacing: 1px;
    }
  </style>
</head>

<body>

  <div class="container">
    <header>
      <h1>Bonheur Cookie</h1>
      <p class="subtitle">BonheurCookie 幸福送達</p>
    </header>

    <div id="links-list"></div>

    <div id="faq-section"></div>

    <footer>
      &copy; 2026 Bonheur Cookie. All Rights Reserved.
    </footer>
  </div>

  <script>
    const config = {
      links: [{
          title: "官方網站 Website",
          url: "https://www.bonheurcookie.com",
          icon: "🌐"
        },
        {
          title: "加入 LINE 官方帳號",
          url: "https://lin.ee/BBVFTZQ",
          icon: "💬"
        },
        {
          title: "FB 追蹤開單動態",
          url: "https://www.facebook.com/BonheurCookie?ref=embed_page",
          icon: "📘"
        },
        {
          title: "徵才資訊 Recruitment",
          url: "https://www.104.com.tw/company/1a2x6blhwm#info06",
          icon: "💼"
        }
      ],
      faqs: [{
          q: "Q1. 產品建議保存方式？",
          a: `<ul>
                <li><strong>達克瓦茲 / 冰磚：</strong>冷凍 14 天</li>
                <li><strong>巧克力松露：</strong>冷凍 7-21 天</li>
                <li><strong>奶油餅：</strong>冷凍 21 天</li>
                <li><strong>費南雪：</strong>常溫 10 天 / 冷凍 14 天</li>
                <li><strong>餅乾：</strong>常溫 14 天</li>
              </ul>
              <div style="font-size: 0.85rem; color: #8C7B70; margin-top: 10px; border-top: 1px dashed #DDD; padding-top: 8px;">
                ※ 本產品不添加人工色素、甜味劑、防腐劑及抗氧化劑 ※
              </div>
              <div class="warning" style="margin-top: 12px; font-size: 0.9em; line-height: 1.6;">
                ⚠️ 保存環境特別提醒：<br>上述天數為「理想狀態」。因家用冰箱冷度不一，溫度不足極易導致甜點受潮變質（特別是鹽奶油紅豆）。為確保品質，強烈建議收到後盡早食用！
              </div>`
        },
        {
          q: "Q2. 產品建議食用方式？",
          a: `<ul>
                <li><strong>達克瓦茲 / 奶油餅：</strong>夏天退冰 10-20 分鐘 / 冬天退冰 20-30 分鐘</li>
                <li><strong>巧克力松露：</strong>退冰 30 分鐘</li>
                <li><strong>冰磚 / 費南雪：</strong>退冰 10 分鐘 </li>
              </ul>
              <div class="warning" style="margin-top: 8px;">※ 為了品質穩定，勿久放高溫環境 ※</div>`
        },
        {
          q: "Q3. 運送方式與運費？",
          a: `<ul>
                <li>冷凍宅配：$190 (外島 $225)</li>
                <li>黑貓宅配週日無配送。</li>
                <li>商品寄出前一天會以簡訊通知。</li>
                <li><span class="warning">不提供面交</span></li>
              </ul>`
        },
        {
          q: "Q4. 連假寄公司怕沒人收？測試",
          a: `黑貓宅急便 週日固定不配送；至於國定連假則不一定休假，實際配送時間將依黑貓作業安排為準。<br>
              若您填寫公司地址，包裹將自動順延至<span class="highlight">正常上班日</span>投遞，不會在休假期間送達到無人收件。`
        },
        {
          q: "Q5. 付款方式有哪些？",
          a: `<ul>
                <li><strong>信用卡付款：</strong>(VISA / Master / JCB)</li>
                <li><strong>💳 ATM／網銀轉帳：</strong>
                    <ul>
                        <li><span class="highlight">繳費期限：</span>下單隔日 23:59 前完成付款。</li>
                        <li>下單後系統自動產生一組「專屬虛擬帳號」。</li>
                        <li>請依訂單金額<span class="warning">完整匯入正確金額</span>；若金額不符，訂單將失效並進入退款流程。</li>
                        <li>逾期未付款，訂單將自動取消，需重新下單。</li>
                        <li>匯款成功後系統自動通知，<span class="highlight">無需另外告知</span>。</li>
                    </ul>
                </li>
                <li><span class="warning">無提供貨到付款 ❌</span></li>
              </ul>`
        },
        {
          q: "Q6. 開立發票須知",
          a: `<ul>
                <li>本店採用電子發票制，出貨時將不會隨貨附上紙本發票。</li>
                <li>完成付款後，系統會自動開立電子發票並寄送至您下單時所填寫的 <span class="highlight">電子郵件信箱</span>。</li>
                <li>若需 開立三聯式發票，請於下單時完整填寫「發票抬頭」及「統一編號」，<span class="warning">訂單完成後無法補開或修改</span>。</li>
                <li>若需將發票 存入手機載具，請於下單時輸入手機載具條碼，<span class="warning">訂單完成後恕無法重新開立或更改</span>。</li>
              </ul>`
        },
        {
          q: "Q7. 製作工期與急件？",
          a: `<span class="highlight">我們堅持手工製作</span>，嚴選頂級食材，極致藝術值得等待。<br><br>
              <ul>
                  <li><span class="warning">純手工製作，無法指定日期。</span></li>
                  <li>無法延後或提早出貨，僅能盡力配合。</li>
                  <li><span class="warning">無法配合者請勿下單。</span></li>
              </ul>`
        },
        {
          q: "Q8. 出貨順序問題？",
          a: `出貨日會依下單順序與送出訂單秒差依序出貨。<br>
              <span class="small">※特殊節慶物流量大 可能延遲到貨※</span>`
        },
        {
          q: "⚠️ Q9. 訂購須知 (下單必讀)",
          a: `<ul>
                 <li>包裏無法完成配送退回，來回運費需自行吸收。</li>
                 <li>網站系統無法合併或拆單 (一單一地址)。</li>
                 <li><span class="warning">無法取消或更改訂單內容。</span></li>
                 <li>生鮮食品<strong>無 7 天鑑賞期</strong>。</li>
                 <li><strong>請於開箱時錄影</strong>，保障雙方權益。</li>
                 <li>本商品不提供紙袋。</li>
              </ul>`
        },
        {
          q: "➜ Q10. 訂單進度查詢",
          a: `如需宅配單號，請於 <span class="highlight">寄出日當天 15:00 後</span> 到訂單內查詢。<br>
              有任何問題請至訂單頁面詢問我們，謝謝。`
        }
      ]
    };

    // 渲染連結
    const linksContainer = document.getElementById('links-list');
    config.links.forEach(link => {
      const card = document.createElement('a');
      card.className = 'link-card';
      card.href = link.url;
      card.target = '_blank';
      card.innerHTML = `
                <div class="link-icon">${link.icon}</div>
                <div class="link-text">${link.title}</div>
                <div class="link-arrow">➜</div>
            `;
      linksContainer.appendChild(card);
    });

    // 渲染 FAQ
    const faqContainer = document.getElementById('faq-section');
    config.faqs.forEach(item => {
      const wrapper = document.createElement('div');
      wrapper.className = 'faq-item';
      wrapper.innerHTML = `
                <button class="faq-question">${item.q}</button>
                <div class="faq-answer">
                    <div class="answer-content">${item.a}</div>
                </div>
            `;
      faqContainer.appendChild(wrapper);
    });

    // FAQ 摺疊功能
    const questions = document.querySelectorAll('.faq-question');
    questions.forEach(btn => {
      btn.addEventListener('click', () => {
        const item = btn.parentElement;
        document.querySelectorAll('.faq-item').forEach(i => {
          if (i !== item) i.classList.remove('active');
        });
        item.classList.toggle('active');
      });
    });
  </script>
</body>

</html>
